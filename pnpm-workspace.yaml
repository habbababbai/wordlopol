packages:
  - 'apps/*'
  - 'packages/*'

autoInstallPeers: true

minimumReleaseAge: 1440
minimumReleaseAgeStrict: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - undici-types@6.21.0
  - semver@6.3.1
  - semver@7.8.2

overrides:
  tar: '>=7.5.8'
  '@hono/node-server': '>=1.19.13'

allowBuilds:
  bcrypt: true
  prisma: true
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
