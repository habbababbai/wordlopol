# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  review_status: false
  # Never edit the PR description — author fills .github/pull_request_template.md
  high_level_summary: false
  poem: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
    labels:
      - '!autorelease: pending'
      - '!skip-review'
    ignore_title_keywords:
      - '[skip review]'
      - 'release api'
      - 'release web'
  path_filters:
    - '!**/*.md'
    - '!docs/**'
    - '!**/CHANGELOG.md'
    - '!.github/release-please/**'
  path_instructions:
    - path: 'apps/api/**'
      instructions: |
        Express + Prisma 7 API. Check auth security, input validation (zod),
        SQL injection safety, JWT/cookie handling, and error responses.
        PostgreSQL via @prisma/adapter-pg. Follow existing patterns in src/.
    - path: 'apps/web/**'
      instructions: |
        React 19 + Vite frontend. Check accessibility, Polish diacritics support,
        API client error handling, and React hooks correctness.
    - path: 'packages/shared/**'
      instructions: |
        Pure TypeScript only — no React, no DB. Keep functions side-effect free.
        Game logic must match Wordle duplicate-letter rules.
    - path: '.github/**'
      instructions: |
        CI/CD and automation. Verify workflow triggers, permissions, and pnpm/turbo usage.
  pre_merge_checks:
    # TypeScript project — no JSDoc convention; default 80% threshold is always 0% noise
    docstrings:
      mode: 'off'
  finishing_touches:
    docstrings:
      enabled: false
chat:
  auto_reply: true
