# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_instructions:
    - path: 'apps/api/**'
      instructions: |
        Express + Prisma 7 API. Check auth security, input validation (zod),
        SQL injection safety, JWT/cookie handling, and error responses.
        PostgreSQL via @prisma/adapter-pg. Follow existing patterns in src/.
    - path: 'apps/web/**'
      instructions: |
        React 19 + Vite frontend. Check accessibility, Polish diacritics support,
        API client error handling, and React hooks correctness.
    - path: 'packages/shared/**'
      instructions: |
        Pure TypeScript only — no React, no DB. Keep functions side-effect free.
        Game logic must match Wordle duplicate-letter rules.
    - path: '.github/**'
      instructions: |
        CI/CD and automation. Verify workflow triggers, permissions, and pnpm/turbo usage.
chat:
  auto_reply: true
