<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Polski Wordle — zgadnij słowo na 5 liter. Graj w trybie dziennym lub nieskończonym."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Wordlopol</title>
  </head>
  <body>
    <script>
      (function () {
        var raw = localStorage.getItem('wordlopol-theme');
        var theme = 'dark';
        if (raw === 'light' || raw === 'dark') {
          theme = raw;
        } else if (raw) {
          try {
            var parsed = JSON.parse(raw);
            if (
              parsed &&
              parsed.state &&
              (parsed.state.theme === 'light' || parsed.state.theme === 'dark')
            ) {
              theme = parsed.state.theme;
            }
          } catch (e) {}
        }
        var isDark = theme !== 'light';
        document.documentElement.classList.toggle('dark', isDark);
        document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
