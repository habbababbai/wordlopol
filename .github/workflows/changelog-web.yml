name: Changelog — Web

# Manual until web development starts. Run from Actions when cutting the first web release.
on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-web
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Release Please — Web
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .github/release-please/web-config.json
          manifest-file: .github/release-please/web-manifest.json

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format Web changelog (Prettier)
        run: |
          BRANCH="release-please--branches--main--components--web"
          if ! git ls-remote --exit-code origin "${BRANCH}" >/dev/null 2>&1; then
            echo "No release branch yet — skipping format"
            exit 0
          fi
          git fetch origin "${BRANCH}"
          git checkout "${BRANCH}"
          pnpm exec prettier --write apps/web/CHANGELOG.md
          git add apps/web/CHANGELOG.md
          if git diff --staged --quiet; then
            echo "Changelog already formatted"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "style(repo): format web changelog with prettier"
          git push origin "${BRANCH}"
