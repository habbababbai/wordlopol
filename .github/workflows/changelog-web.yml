name: Changelog — Web

# Runs when commits land on main (includes PR merges). Does NOT run on feature-branch pushes.
on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/changelog-web.yml'
      - '.github/release-please/web-*.json'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-web
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release Please — Web
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please/web-config.json
          manifest-file: .github/release-please/web-manifest.json

      - name: Summary
        if: always()
        run: |
          echo "release_created=${{ steps.release.outputs.release_created }}"
          echo "pr=${{ steps.release.outputs.pr }}"
          echo "pr_number=${{ steps.release.outputs.pr_number }}"
