name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  branch-name:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate branch name
        run: bash scripts/validate-branch-name.sh "${{ github.head_ref }}"

  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
            ci
            build
            perf
            revert
          scopes: |
            api
            web
            mobile
            shared
            tooling
            data
            repo
          requireScope: true
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            PR title subject must be lowercase (imperative mood).
            Example: feat(api): add jwt refresh rotation

  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: pnpm typecheck

      - name: Build
        run: pnpm build
