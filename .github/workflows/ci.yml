name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs_only:
              - '**/*.md'
              - 'docs/**'
              - 'plans/**'

  branch-name:
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate branch name
        run: bash scripts/validate-branch-name.sh "${{ github.head_ref }}"

  pr-title:
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
            ci
            build
            perf
            revert
          scopes: |
            api
            web
            mobile
            shared
            tooling
            data
            repo
            main
          requireScope: true
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            PR title subject must be lowercase (imperative mood).
            Example: feat(api): add jwt refresh rotation

  validate-release-files:
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Block manual release file edits
        run: bash scripts/validate-release-files.sh "${{ github.base_ref }}" "${{ github.head_ref }}"

  ci:
    needs: changes
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       !startsWith(github.head_ref, 'release-please--') &&
       needs.changes.outputs.docs_only != 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  ci-docs:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check

  ci-release-pr:
    if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check
