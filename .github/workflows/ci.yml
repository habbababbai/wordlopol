name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1635ceea93d857bda4ca1e5c26 # v4.2.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3.0.2
        id: filter
        with:
          filters: |
            docs_only:
              - '**/*.md'
              - 'docs/**'
              - 'plans/**'

  branch-name:
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1635ceea93d857bda4ca1e5c26 # v4.2.2
        with:
          persist-credentials: false
      - name: Validate branch name
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: bash scripts/validate-branch-name.sh "$BRANCH_NAME"

  pr-title:
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      statuses: write
    steps:
      - uses: amannn/action-semantic-pull-request@0990f6eaf41ec4e70c871fdd40e9c0c8c52e0db9 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
            ci
            build
            perf
            revert
          scopes: |
            api
            web
            mobile
            shared
            tooling
            data
            repo
            main
          requireScope: true
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            PR title subject must be lowercase (imperative mood).
            Example: feat(api): add jwt refresh rotation

  validate-release-files:
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1635ceea93d857bda4ca1e5c26 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Block manual release file edits
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: bash scripts/validate-release-files.sh

  ci:
    needs: changes
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       !startsWith(github.head_ref, 'release-please--') &&
       needs.changes.outputs.docs_only != 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1635ceea93d857bda4ca1e5c26 # v4.2.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@37a28957b07793342741ef062a759084323419cf # v4.1.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd09fef463257 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  ci-docs:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1635ceea93d857bda4ca1e5c26 # v4.2.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@37a28957b07793342741ef062a759084323419cf # v4.1.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd09fef463257 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check

  ci-release-pr:
    if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1635ceea93d857bda4ca1e5c26 # v4.2.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@37a28957b07793342741ef062a759084323419cf # v4.1.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd09fef463257 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check
