name: Changelog — API

# Runs when commits land on main (includes PR merges). Does NOT run on feature-branch pushes.
on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'data/**'
      - '.github/workflows/changelog-api.yml'
      - '.github/release-please/api-*.json'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-api
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Release Please — API
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .github/release-please/api-config.json
          manifest-file: .github/release-please/api-manifest.json

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format API changelog (Prettier)
        run: |
          BRANCH="release-please--branches--main--components--api"
          if ! git ls-remote --exit-code origin "${BRANCH}" >/dev/null 2>&1; then
            echo "No release branch yet — skipping format"
            exit 0
          fi
          git fetch origin "${BRANCH}"
          git checkout "${BRANCH}"
          pnpm exec prettier --write apps/api/CHANGELOG.md
          git add apps/api/CHANGELOG.md
          if git diff --staged --quiet; then
            echo "Changelog already formatted"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "style(repo): format api changelog with prettier"
          git push origin "${BRANCH}"
