name: Changelog — API

# Runs when commits land on main (includes PR merges). Does NOT run on feature-branch pushes.
on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'data/**'
      - 'packages/shared/**'
      - '.github/workflows/changelog-api.yml'
      - '.github/release-please/api-*.json'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-api
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release Please — API
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please/api-config.json
          manifest-file: .github/release-please/api-manifest.json
