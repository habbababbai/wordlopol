name: Format release PR changelogs

# Backup: format on PR sync if changelog-api/web format step missed
on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]
    paths:
      - 'apps/**/CHANGELOG.md'

permissions:
  contents: write

jobs:
  prettier:
    if: startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prettier format changelogs
        run: |
          pnpm exec prettier --write "apps/**/CHANGELOG.md"
          pnpm exec prettier --check "apps/**/CHANGELOG.md"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/CHANGELOG.md apps/web/CHANGELOG.md
          if git diff --staged --quiet; then
            echo "Changelog already satisfies Prettier"
            exit 0
          fi
          git commit -m "style(repo): format changelog with prettier"
          git push
